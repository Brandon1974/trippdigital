<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripp Digital Admin - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .logo-text {
            color: #000;
        }

        .logo-accent {
            color: #FF6B00;
        }

        .login-subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #FF6B00;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #FF6B00;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #e55a00;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <span class="logo-text">TRIPP</span>
                <span class="logo-accent">DIGITAL</span>
            </div>
            <p class="login-subtitle">Admin Panel</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter admin password"
                    autocomplete="off"
                    required
                >
            </div>

            <button type="submit" class="login-btn">LOGIN</button>

            <div class="error-message" id="errorMessage"></div>
            <div class="loading" id="loadingMessage">Authenticating...</div>
        </form>
    </div>

    <script>
        const MAX_ATTEMPTS = 5;
        const LOCKOUT_DURATION = 15 * 60 * 1000; // 15 minutes

        function getLoginAttempts() {
            const data = localStorage.getItem('loginAttempts');
            return data ? JSON.parse(data) : { count: 0, timestamp: 0 };
        }

        function setLoginAttempts(attempts) {
            localStorage.setItem('loginAttempts', JSON.stringify(attempts));
        }

        function isLockedOut() {
            const attempts = getLoginAttempts();
            const now = Date.now();
            if (attempts.count >= MAX_ATTEMPTS) {
                if (now - attempts.timestamp < LOCKOUT_DURATION) {
                    return true;
                } else {
                    setLoginAttempts({ count: 0, timestamp: 0 });
                    return false;
                }
            }
            return false;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (isLockedOut()) {
                showError('Too many failed attempts. Please try again later.');
                return;
            }

            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loadingDiv = document.getElementById('loadingMessage');

            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/.netlify/functions/admin-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    setLoginAttempts({ count: 0, timestamp: 0 });
                    window.location.href = '/admin-dashboard.html';
                } else {
                    const attempts = getLoginAttempts();
                    attempts.count++;
                    attempts.timestamp = Date.now();
                    setLoginAttempts(attempts);
                    showError('Invalid password. Please try again.');
                }
            } catch (error) {
                showError('Authentication error. Please try again.');
                console.error('Login error:', error);
            } finally {
                loadingDiv.style.display = 'none';
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Redirect if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.href = '/admin-dashboard.html';
        }
    </script>
</body>
</html>
